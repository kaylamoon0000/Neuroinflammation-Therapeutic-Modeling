<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroTheraSim</title>

<style>
body { margin:0; display:flex; background:#0b1020; color:white; font-family:Arial;}
#left { flex:1; position:relative; }
#right { width:320px; background:#121a33; padding:12px; overflow-y:auto; }
canvas { display:block; background:black; }

button, select, input {
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#1e2b55;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div id="left">
<canvas id="sim"></canvas>
<canvas id="graph" style="position:absolute;bottom:0;height:120px;"></canvas>
</div>

<div id="right">

<h2>NeuroTheraSim</h2>

<button id="toggle">Play / Pause</button>
<button id="reset">Reset</button>

<h3>Presets</h3>
<button data-p="healthy">Healthy</button>
<button data-p="inflamed">Inflammation</button>
<button data-p="degeneration">Degeneration</button>
<button data-p="tumor">Tumor</button>

<h3>Drug</h3>
<select id="drug">
<option value="il10">IL-10</option>
<option value="bdnf">BDNF</option>
<option value="nac">NAC</option>
<option value="tmz">Temozolomide</option>
</select>

Dose <input type="range" id="dose" min="0.1" max="2" step="0.1" value="1">
Radius <input type="range" id="radius" min="1" max="8" value="3">

<h3>Cell Placement (SHIFT+CLICK)</h3>
<select id="cell">
<option value="neuron">Neuron</option>
<option value="tumor">Tumor</option>
<option value="erase">Erase</option>
</select>

</div>

<script>

// ===== CANVAS FIX =====
const sim = document.getElementById("sim");
const ctx = sim.getContext("2d");
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

function resize(){
  sim.width = window.innerWidth - 320;
  sim.height = window.innerHeight;
  graph.width = sim.width;
  graph.height = 120;
}
resize();
window.addEventListener("resize", resize);

// ===== CONSTANTS =====
const SIZE = 60;
let cellSize;

// ===== STATE =====
let grid = [], field = [], running=false, history=[];

// ===== INIT =====
function init(){
  grid=[]; field=[]; history=[];
  cellSize = sim.width / SIZE;

  for(let x=0;x<SIZE;x++){
    grid[x]=[]; field[x]=[];
    for(let y=0;y<SIZE;y++){
      grid[x][y]=Math.random()<0.1?{type:"neuron",h:1,f:0}:null;
      field[x][y]={i:0,g:0,t:0};
    }
  }
}
init();

// ===== PRESETS =====
function preset(p){
  init();
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(p==="inflamed") field[x][y].i=2;
      if(p==="degeneration"){ field[x][y].t=1.5; }
      if(p==="tumor" && Math.random()<0.1){
        grid[x][y]={type:"tumor",h:1,f:0};
      }
    }
  }
}

// ===== DIFFUSION =====
function diffuse(){
  let nf=JSON.parse(JSON.stringify(field));
  let r=0.05;

  for(let x=1;x<SIZE-1;x++){
    for(let y=1;y<SIZE-1;y++){
      for(let k of ["i","g","t"]){
        let v=field[x][y][k];
        let s=field[x+1][y][k]+field[x-1][y][k]+field[x][y+1][k]+field[x][y-1][k];
        nf[x][y][k]=Math.max(0,Math.min(3,v+r*(s-4*v)));
      }
    }
  }
  field=nf;
}

// ===== STEP =====
function step(){
  diffuse();

  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      let c=grid[x][y];
      let f=field[x][y];
      if(!c) continue;

      if(c.type==="neuron"){
        c.h += f.g*0.02 - f.i*0.03 - f.t*0.03;
        c.h=Math.max(0,Math.min(1,c.h));

        if(c.h>0.7 && Math.random()<0.1){
          c.f=1; f.g+=0.05;
        } else c.f=0;

        if(c.h<=0){ grid[x][y]=null; f.t+=0.3; }
      }

      if(c.type==="tumor"){
        f.i+=0.05;
        if(Math.random()<0.02){
          let nx=x+Math.floor(Math.random()*3)-1;
          let ny=y+Math.floor(Math.random()*3)-1;
          if(grid[nx]?.[ny]==null) grid[nx][ny]={type:"tumor",h:1,f:0};
        }
      }
    }
  }

  let count=0;
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(grid[x][y]?.type==="neuron") count++;
    }
  }

  history.push(count);
  if(history.length>200) history.shift();
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,sim.width,sim.height);

  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      let f=field[x][y];

      ctx.fillStyle=`rgb(${f.i*80},${f.g*80},${f.t*80})`;
      ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);

      let c=grid[x][y];
      if(c){
        ctx.fillStyle=c.type==="neuron"?(c.f?"white":"cyan"):"yellow";
        ctx.fillRect(x*cellSize+2,y*cellSize+2,cellSize-4,cellSize-4);
      }
    }
  }
}

// ===== GRAPH =====
function drawGraph(){
  gctx.clearRect(0,0,graph.width,graph.height);
  gctx.beginPath();

  history.forEach((v,i)=>{
    gctx.lineTo(i, graph.height - v);
  });

  gctx.strokeStyle="cyan";
  gctx.stroke();
}

// ===== CLICK INTERACTION (FIXED) =====
sim.addEventListener("click", e=>{
  let rect=sim.getBoundingClientRect();
  let x=Math.floor((e.clientX-rect.left)/cellSize);
  let y=Math.floor((e.clientY-rect.top)/cellSize);

  if(e.shiftKey){
    let type=document.getElementById("cell").value;
    if(type==="erase") grid[x][y]=null;
    else grid[x][y]={type:type,h:1,f:0};
    draw(); // instant feedback
    return;
  }

  let d=parseFloat(document.getElementById("dose").value);
  let r=parseInt(document.getElementById("radius").value);
  let drug=document.getElementById("drug").value;

  for(let dx=-r;dx<=r;dx++){
    for(let dy=-r;dy<=r;dy++){
      let nx=x+dx, ny=y+dy;
      if(field[nx]?.[ny]){
        let f=field[nx][ny];

        if(drug==="il10") f.i*=Math.exp(-0.4*d);
        if(drug==="bdnf") f.g+=0.3*d;
        if(drug==="nac") f.t*=Math.exp(-0.4*d);
        if(drug==="tmz"){
          if(grid[nx][ny]?.type==="tumor") grid[nx][ny]=null;
        }
      }
    }
  }

  draw(); // instant feedback
});

// ===== BUTTONS (EXPLICIT FIX) =====
document.getElementById("toggle").onclick=()=>running=!running;
document.getElementById("reset").onclick=()=>{init(); draw();};

document.querySelectorAll("[data-p]").forEach(b=>{
  b.onclick=()=>{preset(b.dataset.p); draw();};
});

// ===== LOOP =====
function loop(){
  if(running){
    step();
    draw();
    drawGraph();
  }
  requestAnimationFrame(loop);
}

draw();
loop();

</script>

</body>
</html>
