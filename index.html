<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroTheraSim</title>

<style>
body { margin:0; display:flex; background:#0b1020; color:white; font-family:Arial;}
#left { flex:1; position:relative; }
#right { width:340px; background:#121a33; padding:12px; overflow-y:auto; }

canvas { display:block; }

button, select, input {
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#1e2b55;
  border:none;
  color:white;
}

.stat { font-size:13px; }
</style>
</head>

<body>

<div id="left">
<canvas id="sim"></canvas>
<canvas id="graph"></canvas>
</div>

<div id="right">

<h2>NeuroTheraSim</h2>

<button id="toggle">Play / Pause</button>
<button id="reset">Reset</button>

<h3>Therapy</h3>
<select id="therapy">
<option value="il10">IL-10</option>
<option value="bdnf">BDNF</option>
<option value="nac">NAC</option>
<option value="tmz">Temozolomide</option>
<option value="stem">Stem Cells</option>
</select>

Dose <input type="range" id="dose" min="0.1" max="2" step="0.1" value="1">
Radius <input type="range" id="radius" min="2" max="10" value="4">

<h3>Environment</h3>
Age <input type="range" id="age" min="20" max="90" value="40">
Sex 
<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<h3>Metrics</h3>
<div id="stats" class="stat"></div>

</div>

<script>

const sim = document.getElementById("sim");
const ctx = sim.getContext("2d");
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

function resize(){
 sim.width = window.innerWidth - 340;
 sim.height = window.innerHeight - 150;
 graph.width = sim.width;
 graph.height = 150;
}
resize();
window.onresize = resize;

const SIZE=70;
let cellSize;

let grid=[], field=[], running=false;
let histN=[], histT=[], histI=[];
let effects=[];

function init(){
 grid=[]; field=[];
 cellSize=sim.width/SIZE;

 for(let x=0;x<SIZE;x++){
  grid[x]=[]; field[x]=[];
  for(let y=0;y<SIZE;y++){
   grid[x][y]=Math.random()<0.12?{type:"neuron",h:1}:null;
   field[x][y]={i:0,g:0,t:0};
  }
 }
}
init();

function step(){

 let age=+ageSlider.value;
 let sexFactor=sexSelect.value==="female"?0.9:1;
 let ageFactor=1+(age-40)/120;

 let neurons=0, tumors=0, inflSum=0;

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   let c=grid[x][y];
   let f=field[x][y];

   // decay fields
   f.i*=0.98; f.g*=0.98; f.t*=0.98;

   if(c){
     let g=f.g/(1+f.g);
     let i=f.i/(1+f.i);
     let t=f.t/(1+f.t);

     if(c.type==="neuron"){
       c.h += g*0.02 - i*0.025*sexFactor - t*0.03*ageFactor;
       c.h=Math.max(0,Math.min(1,c.h));

       if(c.h<=0){ grid[x][y]=null; }
       else neurons++;
     }

     if(c.type==="tumor"){
       tumors++;
       f.i+=0.02;

       if(Math.random()<0.01){
         let nx=x+(Math.random()*3|0)-1;
         let ny=y+(Math.random()*3|0)-1;
         if(grid[nx]?.[ny]==null) grid[nx][ny]={type:"tumor",h:1};
       }
     }
   }

   inflSum+=f.i;
  }
 }

 histN.push(neurons);
 histT.push(tumors);
 histI.push(inflSum/500);

 if(histN.length>200){
  histN.shift(); histT.shift(); histI.shift();
 }

 document.getElementById("stats").innerHTML=
 `Neurons: ${neurons}<br>Tumors: ${tumors}<br>Inflammation: ${inflSum.toFixed(1)}`;
}

function draw(){

 ctx.fillStyle="black";
 ctx.fillRect(0,0,sim.width,sim.height);

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   let f=field[x][y];

   ctx.fillStyle=`rgba(${f.i*255},${f.g*255},${f.t*255},0.15)`;
   ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);

   let c=grid[x][y];
   if(c){
     ctx.fillStyle=c.type==="neuron"?"cyan":"yellow";
     ctx.beginPath();
     ctx.arc(x*cellSize,y*cellSize,cellSize/3,0,6.28);
     ctx.fill();
   }
  }
 }

 effects.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x,e.y,e.r,0,6.28);
   ctx.strokeStyle="white";
   ctx.stroke();
   e.r+=3;
 });
 effects=effects.filter(e=>e.r<80);
}

function drawGraph(){
 gctx.clearRect(0,0,graph.width,graph.height);

 gctx.strokeStyle="cyan";
 gctx.beginPath();
 histN.forEach((v,i)=>gctx.lineTo(i,150-v));
 gctx.stroke();

 gctx.strokeStyle="yellow";
 gctx.beginPath();
 histT.forEach((v,i)=>gctx.lineTo(i,150-v));
 gctx.stroke();

 gctx.strokeStyle="red";
 gctx.beginPath();
 histI.forEach((v,i)=>gctx.lineTo(i,150-v));
 gctx.stroke();
}

// controls
const therapySel=document.getElementById("therapy");
const doseSlider=document.getElementById("dose");
const radiusSlider=document.getElementById("radius");
const ageSlider=document.getElementById("age");
const sexSelect=document.getElementById("sex");

sim.onclick=e=>{
 let rect=sim.getBoundingClientRect();
 let x=Math.floor((e.clientX-rect.left)/cellSize);
 let y=Math.floor((e.clientY-rect.top)/cellSize);

 let r=+radiusSlider.value;
 let d=+doseSlider.value;

 effects.push({x:e.clientX-rect.left,y:e.clientY-rect.top,r:5});

 for(let dx=-r;dx<=r;dx++){
  for(let dy=-r;dy<=r;dy++){
   let nx=x+dx, ny=y+dy;
   if(field[nx]?.[ny]){
     let f=field[nx][ny];

     if(therapySel.value==="il10") f.i*=0.5;
     if(therapySel.value==="bdnf") f.g+=0.4*d;
     if(therapySel.value==="nac") f.t*=0.5;

     if(therapySel.value==="tmz"){
       if(grid[nx][ny]?.type==="tumor") grid[nx][ny]=null;
     }

     if(therapySel.value==="stem"){
       if(!grid[nx][ny] && Math.random()<0.3){
         grid[nx][ny]={type:"neuron",h:1};
       }
     }
   }
  }
 }
};

function loop(){
 if(running){
   step();
   draw();
   drawGraph();
 }
 requestAnimationFrame(loop);
}

document.getElementById("toggle").onclick=()=>running=!running;
document.getElementById("reset").onclick=init;

loop();

</script>

</body>
</html>
