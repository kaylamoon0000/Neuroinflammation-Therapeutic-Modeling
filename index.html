<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTheraSim - Neuroscience Simulator</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --accent: #38bdf8; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        #sidebar { width: 350px; background: var(--panel); padding: 20px; border-right: 1px solid #334155; overflow-y: auto; z-index: 10; }
        h1 { font-size: 1.2rem; color: var(--accent); margin-top: 0; }
        .control-group { margin-bottom: 20px; padding: 10px; background: #0f172a; border-radius: 8px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }
        select, input, button { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: none; background: #334155; color: white; cursor: pointer; }
        button#run-btn { background: #22c55e; font-weight: bold; }
        button#run-btn.stop { background: #ef4444; }

        /* Canvas Area */
        #viewport { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        canvas { border: 1px solid #334155; box-shadow: 0 0 50px rgba(0,0,0,0.5); image-rendering: pixelated; }
        
        /* Stats Overlay */
        #stats { position: absolute; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; pointer-events: none; }
        .stat-item { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>🧠 NeuroTheraSim v1.0</h1>
    
    <div class="control-group">
        <label>Disease Preset</label>
        <select id="preset-select">
            <option value="healthy">Healthy Brain</option>
            <option value="alzheimers">Chronic Neurodegeneration (AD)</option>
            <option value="glioblastoma">Glioblastoma (TME)</option>
            <option value="inflammation">Acute Neuroinflammation</option>
        </select>

        <label>Subject Age (Impacts Regeneration)</label>
        <input type="range" id="age-slider" min="1" max="100" value="25">
        <div style="text-align:right; font-size:0.7rem;" id="age-val">25 years</div>
    </div>

    <div class="control-group">
        <label>Therapeutic Intervention</label>
        <select id="drug-select">
            <option value="none">None</option>
            <option value="anti_inflammatory">Anti-Inflammatory (IL-10)</option>
            <option value="neuroprotective">Neuroprotective (BDNF)</option>
            <option value="stem_cell">MSC Secretome</option>
        </select>
        <button id="apply-drug-btn">Inject Therapy</button>
    </div>

    <button id="run-btn">START SIMULATION</button>
    <button id="reset-btn">RESET GRID</button>

    <div class="control-group" style="margin-top:20px;">
        <label>View Mode</label>
        <select id="view-mode">
            <option value="cells">Cell Morphology</option>
            <option value="cytokines">Cytokine Field (Heatmap)</option>
            <option value="drug">Drug Concentration</option>
        </select>
    </div>
</div>

<div id="viewport">
    <canvas id="simCanvas"></canvas>
    <div id="stats">
        <div class="stat-item"><span>Neurons Viable:</span> <span id="stat-neurons">0</span></div>
        <div class="stat-item"><span>Glia Activation:</span> <span id="stat-glia">0%</span></div>
        <div class="stat-item"><span>Cytokine Level:</span> <span id="stat-tox">0.0</span></div>
    </div>
</div>

<script>
/**
 * NEUROTHERASIM ENGINE
 */
const config = {
    gridSize: 80,
    cellSize: 8,
    diffusionRate: 0.1,
    decayRate: 0.02
};

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = config.gridSize * config.cellSize;

let isRunning = false;
let cells = [];
let cytokineGrid = Array(config.gridSize).fill().map(() => Array(config.gridSize).fill(0));
let drugGrid = Array(config.gridSize).fill().map(() => Array(config.gridSize).fill(0));

class Cell {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'neuron', 'microglia', 'astrocyte', 'cancer'
        this.health = 100;
        this.activated = false;
    }

    update() {
        const cx = Math.floor(this.x);
        const cy = Math.floor(this.y);
        
        // Logic: Neurons die if cytokines are too high
        if (this.type === 'neuron') {
            if (cytokineGrid[cx][cy] > 0.4) this.health -= 0.5;
            if (drugGrid[cx][cy] > 0.2) this.health += 0.2; // Neuroprotection
        }

        // Logic: Microglia activate in presence of damage
        if (this.type === 'microglia') {
            if (cytokineGrid[cx][cy] > 0.2) this.activated = true;
            if (this.activated) {
                cytokineGrid[cx][cy] = Math.min(1, cytokineGrid[cx][cy] + 0.05); // Secrete cytokines
            }
        }

        this.health = Math.min(100, Math.max(0, this.health));
    }

    draw() {
        if (this.health <= 0) return;
        const view = document.getElementById('view-mode').value;
        if (view !== 'cells') return;

        ctx.fillStyle = this.getColor();
        const size = this.type === 'neuron' ? 3 : 2;
        ctx.beginPath();
        ctx.arc(this.x * config.cellSize, this.y * config.cellSize, size, 0, Math.PI * 2);
        ctx.fill();
    }

    getColor() {
        if (this.type === 'neuron') return `hsl(200, 100%, ${this.health}%)`;
        if (this.type === 'microglia') return this.activated ? '#ef4444' : '#22c55e';
        if (this.type === 'cancer') return '#a855f7';
        return '#eab308'; // Astrocyte
    }
}

function diffuse(grid) {
    let nextGrid = grid.map(row => [...row]);
    for (let x = 1; x < config.gridSize - 1; x++) {
        for (let y = 1; y < config.gridSize - 1; y++) {
            const sum = grid[x+1][y] + grid[x-1][y] + grid[x][y+1] + grid[x][y-1];
            nextGrid[x][y] = grid[x][y] + config.diffusionRate * (sum - 4 * grid[x][y]);
            nextGrid[x][y] *= (1 - config.decayRate); // Metabolism
        }
    }
    return nextGrid;
}

function initSim() {
    cells = [];
    const preset = document.getElementById('preset-select').value;
    const age = document.getElementById('age-slider').value;

    // Reset Grids
    cytokineGrid = Array(config.gridSize).fill().map(() => Array(config.gridSize).fill(0));
    drugGrid = Array(config.gridSize).fill().map(() => Array(config.gridSize).fill(0));

    // Populate based on preset
    for (let i = 0; i < 400; i++) {
        let type = 'neuron';
        if (i > 300) type = 'microglia';
        if (i > 350) type = 'astrocyte';
        if (preset === 'glioblastoma' && i > 380) type = 'cancer';

        cells.push(new Cell(
            Math.random() * config.gridSize,
            Math.random() * config.gridSize,
            type
        ));
    }

    if (preset === 'inflammation') {
        cytokineGrid[40][40] = 1.0; // Trigger spot
    }
}

function loop() {
    if (!isRunning) return;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const view = document.getElementById('view-mode').value;

    // 1. Update Physics (Diffusion)
    cytokineGrid = diffuse(cytokineGrid);
    drugGrid = diffuse(drugGrid);

    // 2. Draw Heatmaps if selected
    if (view !== 'cells') {
        const activeGrid = view === 'cytokines' ? cytokineGrid : drugGrid;
        const color = view === 'cytokines' ? '255, 50, 50' : '50, 255, 100';
        for (let x = 0; x < config.gridSize; x++) {
            for (let y = 0; y < config.gridSize; y++) {
                if (activeGrid[x][y] > 0.01) {
                    ctx.fillStyle = `rgba(${color}, ${activeGrid[x][y]})`;
                    ctx.fillRect(x * config.cellSize, y * config.cellSize, config.cellSize, config.cellSize);
                }
            }
        }
    }

    // 3. Update & Draw Cells
    let livingNeurons = 0;
    let activeGlia = 0;
    cells.forEach(cell => {
        cell.update();
        cell.draw();
        if (cell.type === 'neuron' && cell.health > 0) livingNeurons++;
        if (cell.type === 'microglia' && cell.activated) activeGlia++;
    });

    // Update Stats
    document.getElementById('stat-neurons').innerText = livingNeurons;
    document.getElementById('stat-glia').innerText = Math.round((activeGlia / 100) * 100) + '%';
    
    requestAnimationFrame(loop);
}

// UI Controls
document.getElementById('run-btn').addEventListener('click', (e) => {
    isRunning = !isRunning;
    e.target.innerText = isRunning ? "STOP SIMULATION" : "START SIMULATION";
    e.target.className = isRunning ? "stop" : "";
    if (isRunning) loop();
});

document.getElementById('reset-btn').addEventListener('click', initSim);

document.getElementById('apply-drug-btn').addEventListener('click', () => {
    // Inject drug in the center
    drugGrid[40][40] = 5.0; 
});

document.getElementById('age-slider').addEventListener('input', (e) => {
    document.getElementById('age-val').innerText = e.target.value + " years";
});

// Initialize
initSim();
</script>
</body>
</html>
