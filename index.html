<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroTheraSim X</title>

<style>
body { margin:0; font-family:Arial; background:#0a0f1f; color:#dbe3ff; }
#container { display:flex; height:100vh; }
canvas { background:black; }

#ui {
  width:360px;
  background:#121a33;
  padding:12px;
  overflow-y:auto;
}

button, select, input {
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#1e2b55;
  border:none;
  color:white;
}

.small { font-size:12px; opacity:0.7; }
</style>
</head>

<body>
<div id="container">
<canvas id="sim"></canvas>

<div id="ui">
<h2>NeuroTheraSim X</h2>

<button onclick="toggle()">Play / Pause</button>
<button onclick="reset()">Reset</button>

<h3>Presets</h3>
<button onclick="preset('healthy')">Healthy</button>
<button onclick="preset('inflamed')">Inflammation</button>
<button onclick="preset('degeneration')">Degeneration</button>
<button onclick="preset('tumor')">Tumor</button>

<h3>Therapy</h3>
<select id="drug">
<option value="anti">Anti-inflammatory</option>
<option value="growth">Neurotrophic</option>
<option value="toxin">Detox</option>
</select>

<label>Dose</label>
<input type="range" id="dose" min="0.1" max="2" step="0.1" value="1">

<h3>Gene Toggles</h3>
<label>Receptor Sensitivity</label>
<input type="range" id="receptor" min="0.5" max="2" step="0.1" value="1">

<h3>Graph</h3>
<canvas id="graph" height="100"></canvas>

<h3>Save</h3>
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>

<div class="small">Click = therapy | Shift+Click = add neurons</div>

</div>
</div>

<script>
const SIZE=80;
const canvas=document.getElementById("sim");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth-360;
canvas.height=window.innerHeight;

const cellSize=canvas.width/SIZE;

let running=false;
let grid=[], field=[];

function clamp(v,min=0,max=3){
 if(!isFinite(v)) return 0;
 return Math.max(min,Math.min(max,v));
}

class Cell{
 constructor(type){
  this.type=type;
  this.health=1;
  this.fire=0;
 }

 update(x,y){
  let f=field[x][y];
  let sens=parseFloat(document.getElementById("receptor").value);

  // nonlinear dose-response
  let infl = f.i/(1+f.i);
  let tox = f.t/(1+f.t);
  let growth = f.g/(1+f.g);

  if(this.type==="neuron"){
    this.health += sens*(growth*0.02 - infl*0.03 - tox*0.04);
    this.health=clamp(this.health,0,1);

    // firing
    if(this.health>0.6 && Math.random()<0.1){
      this.fire=1;
      f.g += 0.1; // activity-dependent growth
    } else this.fire=0;

    if(this.health<=0){
      grid[x][y]=null;
      f.t += 0.5;
    }
  }

  if(this.type==="tumor"){
    f.i += 0.05;
    if(Math.random()<0.02){
      let nx=x+Math.floor(Math.random()*3)-1;
      let ny=y+Math.floor(Math.random()*3)-1;
      if(grid[nx]?.[ny]==null) grid[nx][ny]=new Cell("tumor");
    }
  }
 }
}

function init(){
 grid=[]; field=[];
 for(let x=0;x<SIZE;x++){
  grid[x]=[]; field[x]=[];
  for(let y=0;y<SIZE;y++){
    grid[x][y]=Math.random()<0.1?new Cell("neuron"):null;
    field[x][y]={i:0,g:0,t:0};
  }
 }
}

function preset(p){
 init();
 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
   if(p==="inflamed") field[x][y].i=1.5;
   if(p==="degeneration"){
     field[x][y].t=1;
     if(grid[x][y]) grid[x][y].health=0.6;
   }
   if(p==="tumor" && Math.random()<0.05){
     grid[x][y]=new Cell("tumor");
   }
  }
 }
}

function diffuse(){
 let nf=JSON.parse(JSON.stringify(field));
 let r=0.05;

 for(let x=1;x<SIZE-1;x++){
  for(let y=1;y<SIZE-1;y++){
   for(let k of ["i","g","t"]){
    let v=field[x][y][k];
    let s=field[x+1][y][k]+field[x-1][y][k]+field[x][y+1][k]+field[x][y-1][k];
    nf[x][y][k]=clamp(v+r*(s-4*v));
   }
  }
 }
 field=nf;
}

function step(){
 diffuse();
 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
    if(grid[x][y]) grid[x][y].update(x,y);
  }
 }
 record();
}

function draw(){
 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
   let f=field[x][y];
   ctx.fillStyle=`rgb(${f.i*80},${f.g*80},${f.t*80})`;
   ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);

   let c=grid[x][y];
   if(c){
     ctx.fillStyle=c.type==="neuron"?"cyan":"yellow";
     if(c.fire) ctx.fillStyle="white";
     ctx.fillRect(x*cellSize+2,y*cellSize+2,cellSize-4,cellSize-4);
   }
  }
 }
}

// therapy FIXED (no neuron killing)
canvas.onclick=e=>{
 let rect=canvas.getBoundingClientRect();
 let x=Math.floor((e.clientX-rect.left)/cellSize);
 let y=Math.floor((e.clientY-rect.top)/cellSize);

 if(e.shiftKey){
   grid[x][y]=new Cell("neuron");
 } else {
   let type=document.getElementById("drug").value;
   let d=parseFloat(document.getElementById("dose").value);

   for(let dx=-3;dx<=3;dx++){
    for(let dy=-3;dy<=3;dy++){
     let nx=x+dx, ny=y+dy;
     if(field[nx]?.[ny]){
       if(type==="anti") field[nx][ny].i*=Math.exp(-0.3*d);
       if(type==="growth") field[nx][ny].g+=0.3*d;
       if(type==="toxin") field[nx][ny].t*=Math.exp(-0.4*d);
     }
    }
   }
 }
};

// graph
let history=[];
function record(){
 let count=0;
 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
    if(grid[x][y]?.type==="neuron") count++;
  }
 }
 history.push(count);
 if(history.length>200) history.shift();
 drawGraph();
}

function drawGraph(){
 let g=document.getElementById("graph").getContext("2d");
 g.clearRect(0,0,300,100);
 g.beginPath();
 history.forEach((v,i)=>{
   g.lineTo(i,100-v/2);
 });
 g.strokeStyle="cyan";
 g.stroke();
}

function save(){
 localStorage.setItem("sim",JSON.stringify({grid,field}));
}

function load(){
 let data=JSON.parse(localStorage.getItem("sim"));
 if(data){ grid=data.grid; field=data.field; }
}

function loop(){
 if(running){ step(); draw(); }
 requestAnimationFrame(loop);
}

function toggle(){ running=!running; }
function reset(){ init(); }

init();
loop();
</script>
</body>
</html>
