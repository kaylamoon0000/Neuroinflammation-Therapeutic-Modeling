<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroTheraSim</title>

<style>
body { margin:0; font-family:Arial; background:#0a0f1f; color:#dbe3ff; }
#container { display:flex; height:100vh; }
canvas { background:black; cursor:crosshair; }

#ui {
  width:380px;
  background:#121a33;
  padding:15px;
  overflow-y:auto;
}

button, select, input {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#1e2b55;
  border:none;
  color:white;
}

.desc { font-size:12px; opacity:0.7; }

.legend-box { display:flex; align-items:center; margin:4px 0; }
.color { width:14px; height:14px; margin-right:6px; }
</style>
</head>

<body>
<div id="container">

<canvas id="canvas"></canvas>

<div id="ui">
<h2>NeuroTheraSim</h2>

<button onclick="toggle()">Play / Pause</button>
<button onclick="reset()">Reset</button>

<h3>Presets</h3>
<button onclick="preset('healthy')">Healthy</button>
<button onclick="preset('inflamed')">Neuroinflammation</button>
<button onclick="preset('degeneration')">Neurodegeneration</button>
<button onclick="preset('tumor')">Tumor Microenvironment</button>

<h3>Drug Application</h3>
<select id="drugType">
<option value="anti">Anti-inflammatory</option>
<option value="growth">Growth Factor</option>
<option value="toxin">Toxin Clearance</option>
</select>

<label>Dose</label>
<input type="range" id="dose" min="0.5" max="3" step="0.5" value="1.5">

<label>Radius</label>
<input type="range" id="radius" min="1" max="8" value="3">

<div class="desc">Click = therapy | Shift+Click = place cells</div>

<h3>Cells</h3>
<select id="cellType">
<option value="neuron">Neuron</option>
<option value="microglia">Microglia</option>
<option value="astrocyte">Astrocyte</option>
<option value="tumor">Tumor</option>
<option value="erase">Erase</option>
</select>

<h3>Legend</h3>
<div class="legend-box"><div class="color" style="background:cyan"></div>Neuron</div>
<div class="legend-box"><div class="color" style="background:red"></div>Microglia</div>
<div class="legend-box"><div class="color" style="background:lime"></div>Astrocyte</div>
<div class="legend-box"><div class="color" style="background:yellow"></div>Tumor</div>

<div class="desc">Background = fields (R=inflammation, G=growth, B=toxicity)</div>

<h3>Inspector</h3>
<div id="inspect"></div>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth - 380;
canvas.height = window.innerHeight;

const SIZE = 90;
const cellSize = canvas.width / SIZE;

let running = false;
let grid = [], fields = [];

// 🔒 Stability clamp
function clamp(v, min=0, max=5){
  if (!isFinite(v) || isNaN(v)) return 0;
  return Math.max(min, Math.min(max, v));
}

function createField(){
  return {inflammation:0, growth:0, toxicity:0};
}

class Cell {
  constructor(type){
    this.type = type;
    this.health = 100;
  }

  update(x,y){
    let f = fields[x][y];

    if(this.type==="neuron"){
      this.health -= clamp(f.inflammation)*0.25;
      this.health -= clamp(f.toxicity)*0.3;
      this.health += clamp(f.growth)*0.15;

      this.health = clamp(this.health,0,100);

      if(this.health<=0){
        grid[x][y]=null;
        f.toxicity = clamp(f.toxicity + 1);
      }
    }

    if(this.type==="astrocyte"){
      f.growth = clamp(f.growth + 0.15);
      f.inflammation = clamp(f.inflammation * 0.97);
    }

    if(this.type==="microglia"){
      f.toxicity = clamp(f.toxicity - 0.2);
      f.inflammation = clamp(f.inflammation + 0.15);
    }

    if(this.type==="tumor"){
      f.inflammation = clamp(f.inflammation + 0.3);

      if(Math.random()<0.02){
        let nx=x+Math.floor(Math.random()*3)-1;
        let ny=y+Math.floor(Math.random()*3)-1;
        if(grid[nx]?.[ny]==null){
          grid[nx][ny]=new Cell("tumor");
        }
      }
    }
  }
}

function init(){
  grid=[]; fields=[];
  for(let x=0;x<SIZE;x++){
    grid[x]=[]; fields[x]=[];
    for(let y=0;y<SIZE;y++){
      let r=Math.random();
      if(r<0.1) grid[x][y]=new Cell("neuron");
      else if(r<0.15) grid[x][y]=new Cell("microglia");
      else if(r<0.2) grid[x][y]=new Cell("astrocyte");
      else grid[x][y]=null;

      fields[x][y]=createField();
    }
  }
}

function preset(type){
  init();
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      let f=fields[x][y];

      if(type==="inflamed") f.inflammation=2;

      if(type==="degeneration"){
        f.toxicity=1.5;
        if(grid[x][y]?.type==="neuron") grid[x][y].health=60;
      }

      if(type==="tumor"){
        if(Math.random()<0.05) grid[x][y]=new Cell("tumor");
      }
    }
  }
}

// 🔬 Stable diffusion
function diffuse(){
  let rate = 0.08;
  let newF = JSON.parse(JSON.stringify(fields));

  for(let x=1;x<SIZE-1;x++){
    for(let y=1;y<SIZE-1;y++){
      for(let k in fields[x][y]){
        let val = fields[x][y][k];

        let sum =
          fields[x+1][y][k] +
          fields[x-1][y][k] +
          fields[x][y+1][k] +
          fields[x][y-1][k];

        let next = val + rate*(sum - 4*val);
        newF[x][y][k] = clamp(next);
      }
    }
  }

  fields = newF;
}

function step(){
  diffuse();

  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(grid[x][y]) grid[x][y].update(x,y);
    }
  }
}

// 🎨 Rendering
function draw(){
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){

      let f=fields[x][y];

      let r = clamp(f.inflammation)*80;
      let g = clamp(f.growth)*80;
      let b = clamp(f.toxicity)*80;

      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);

      let c=grid[x][y];
      if(c){
        if(c.type==="neuron") ctx.fillStyle="cyan";
        if(c.type==="microglia") ctx.fillStyle="red";
        if(c.type==="astrocyte") ctx.fillStyle="lime";
        if(c.type==="tumor") ctx.fillStyle="yellow";

        ctx.fillRect(x*cellSize+2,y*cellSize+2,cellSize-4,cellSize-4);
      }
    }
  }
}

// 🧪 Interaction
canvas.addEventListener("click",e=>{
  let rect=canvas.getBoundingClientRect();
  let x=Math.floor((e.clientX-rect.left)/cellSize);
  let y=Math.floor((e.clientY-rect.top)/cellSize);

  if(e.shiftKey){
    let type=document.getElementById("cellType").value;
    if(type==="erase") grid[x][y]=null;
    else grid[x][y]=new Cell(type);
  } else {
    let type=document.getElementById("drugType").value;
    let dose=parseFloat(document.getElementById("dose").value);
    let rad=parseInt(document.getElementById("radius").value);

    for(let dx=-rad;dx<=rad;dx++){
      for(let dy=-rad;dy<=rad;dy++){
        let nx=x+dx, ny=y+dy;

        if(fields[nx]?.[ny]){
          if(type==="anti")
            fields[nx][ny].inflammation = clamp(fields[nx][ny].inflammation * (1 - 0.2*dose));

          if(type==="growth")
            fields[nx][ny].growth = clamp(fields[nx][ny].growth + 0.5*dose);

          if(type==="toxin")
            fields[nx][ny].toxicity = clamp(fields[nx][ny].toxicity * (1 - 0.3*dose));
        }
      }
    }
  }
});

// 🔍 Inspector
canvas.addEventListener("mousemove",e=>{
  let rect=canvas.getBoundingClientRect();
  let x=Math.floor((e.clientX-rect.left)/cellSize);
  let y=Math.floor((e.clientY-rect.top)/cellSize);

  let c=grid[x]?.[y];
  let f=fields[x]?.[y];

  document.getElementById("inspect").innerHTML =
    `Cell: ${c?c.type:"None"}<br>
     Inflammation: ${f.inflammation.toFixed(2)}<br>
     Growth: ${f.growth.toFixed(2)}<br>
     Toxicity: ${f.toxicity.toFixed(2)}`;
});

function loop(){
  if(running){
    step();
    draw();
  }
  requestAnimationFrame(loop);
}

function toggle(){ running=!running; }
function reset(){ init(); }

init();
loop();
</script>
</body>
</html>
