<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroTheraSim | Clinical Reality v1.8</title>
    <style>
        :root { --bg: #020617; --panel: #0f172a; --text: #f1f5f9; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; --border: #334155; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        h1 { font-size: 1.4rem; color: var(--accent); margin: 0; font-weight: 800; }
        .section { margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); }
        label { display: block; font-size: 0.6rem; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; color: #94a3b8; }
        select, input, button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 0.8rem; margin-bottom: 6px; }
        button { cursor: pointer; font-weight: 700; border: none; }
        #run-btn { background: var(--success); color: #052e16; }
        #run-btn.active { background: var(--danger); color: white; }
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #top-bar { height: 75px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; gap: 40px; }
        .stat-value { font-family: 'monospace'; font-size: 1.2rem; color: var(--accent); font-weight: bold; }
        #canvas-wrap { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        canvas { background: #000; border: 1px solid #1e293b; cursor: crosshair; }
        #legend { position: absolute; bottom: 20px; left: 20px; background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.7rem; display: flex; gap: 20px; }
        .leg-col { display: flex; flex-direction: column; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>NeuroTheraSim</h1>
    <div style="font-size:0.6rem; opacity:0.5; margin-bottom:15px;">v1.8 | MORTALITY ENGINE</div>
    
    <div class="section">
        <label>Patient Age</label>
        <input type="number" id="age-input" value="80">
        <label>Disease State</label>
        <select id="preset-select">
            <option value="healthy">Healthy</option>
            <option value="ad">Alzheimer's (Severe)</option>
            <option value="gbm">Glioblastoma</option>
        </select>
    </div>

    <div class="section">
        <label>Manual Placement</label>
        <select id="tool-select">
            <option value="neuron">Neuron</option>
            <option value="microglia">Microglia</option>
            <option value="cancer">Cancer Cell</option>
        </select>
    </div>

    <div class="section">
        <label>Therapeutics</label>
        <button onclick="inject('bdnf')" style="background:#0ea5e9">BDNF (Blue)</button>
        <button onclick="inject('il10')" style="background:#10b981">IL-10 (Green)</button>
        <button onclick="inject('chemo')" style="background:#f59e0b">Chemo (Orange)</button>
    </div>

    <button id="run-btn">START SIMULATION</button>
    <button onclick="exportCSV()" style="background:#6366f1; margin-top:5px;">EXPORT CSV</button>
    <button onclick="init()" style="background:#475569; margin-top:10px;">RESET</button>
</div>

<div id="main">
    <div id="top-bar">
        <div class="stat"><div style="font-size:0.6rem;color:#94a3b8">AGE</div><span id="stat-age" class="stat-value">80.0</span></div>
        <div class="stat"><div style="font-size:0.6rem;color:#94a3b8">VIABILITY</div><span id="stat-neurons" class="stat-value">100.00%</span></div>
        <div class="stat"><div style="font-size:0.6rem;color:#94a3b8">INFLAMMATION</div><span id="stat-tox" class="stat-value">0.0%</span></div>
    </div>
    <div id="canvas-wrap">
        <canvas id="simCanvas"></canvas>
        <div id="legend">
            <div class="leg-col">
                <strong>CELLS</strong>
                <div><span class="dot" style="background:#38bdf8"></span>Neuron</div>
                <div><span class="dot" style="background:#ef4444"></span>Active Glia</div>
                <div><span class="dot" style="background:#a855f7"></span>Cancer</div>
            </div>
            <div class="leg-col">
                <strong>DRUGS</strong>
                <div><span class="dot" style="background:#0ea5e9"></span>BDNF</div>
                <div><span class="dot" style="background:#10b981"></span>IL-10</div>
                <div><span class="dot" style="background:#f59e0b"></span>Chemo</div>
            </div>
        </div>
    </div>
</div>

<script>
const DIM = 100, ZOOM = 7;
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = DIM * ZOOM;

let isRunning = false, ticks = 0, baseline = 0, history = [];
let cells = [];
let grids = { tox: [], bdnf: [], il10: [], chemo: [] };

function emptyGrid() { return Array(DIM).fill().map(() => Array(DIM).fill(0)); }

class Cell {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.health = 100; this.active = false; this.repro = 0;
    }
    update(age, tx, bdnf, il10, chemo) {
        if (this.health <= 0) return;

        // REALITY CHECK: Mortality accelerates exponentially after age 90
        // Gompertz Law: rate = a * exp(b * age)
        const mortalityBase = 0.005 * Math.exp(0.05 * (age - 80));
        const adMultiplier = (document.getElementById('preset-select').value === 'ad') ? 8 : 1;

        if (this.type === 'neuron') {
            // Natural aging death
            this.health -= mortalityBase;
            // Alzheimer's / Tox death
            if (tx > 0.05) this.health -= (tx * adMultiplier * (age/60));
            // Therapy (Weakens with age)
            const repairPower = Math.max(0, 0.5 - (age/200));
            if (bdnf > 0.2 && this.health < 100) this.health += repairPower;
        }
        if (this.type === 'microglia') {
            if (tx > 0.2 || this.active) {
                this.active = true;
                grids.tox[Math.floor(this.x)][Math.floor(this.y)] += 0.1;
            }
            if (il10 > 0.4) this.active = false;
        }
        if (this.type === 'cancer') {
            this.repro++;
            grids.tox[Math.floor(this.x)][Math.floor(this.y)] = 1.0;
            if (chemo > 0.1) this.health -= 20;
            if (this.repro > 40 && this.health > 50) { this.repro = 0; return 'divide'; }
        }
    }
}

function init() {
    cells = []; ticks = 0; history = [];
    Object.keys(grids).forEach(k => grids[k] = emptyGrid());
    for(let i=0; i<1200; i++) cells.push(new Cell(Math.random()*DIM, Math.random()*DIM, 'neuron'));
    for(let i=0; i<100; i++) cells.push(new Cell(Math.random()*DIM, Math.random()*DIM, 'microglia'));
    
    if (document.getElementById('preset-select').value === 'ad') {
        for(let i=0; i<50; i++) grids.tox[Math.floor(Math.random()*DIM)][Math.floor(Math.random()*DIM)] = 1.0;
    }
    if (document.getElementById('preset-select').value === 'gbm') cells.push(new Cell(50,50,'cancer'));

    baseline = cells.filter(c => c.type === 'neuron').length;
    updateStats();
    render();
}

function loop() {
    if (!isRunning) return;
    const startAge = parseFloat(document.getElementById('age-input').value);
    
    for(let s=0; s<20; s++) { // Simulating speed
        ticks++;
        const currentAge = startAge + (ticks / 500);
        
        // Diffusion
        ['tox', 'bdnf', 'il10', 'chemo'].forEach(k => {
            let g = grids[k], next = emptyGrid();
            for(let x=1; x<DIM-1; x++) for(let y=1; y<DIM-1; y++) {
                let avg = (g[x+1][y]+g[x-1][y]+g[x][y+1]+g[x][y-1])/4;
                next[x][y] = (g[x][y] + 0.1*(avg-g[x][y])) * (k === 'tox' ? 0.99 : 0.95);
            }
            grids[k] = next;
        });

        let newborns = [];
        cells.forEach(c => {
            const res = c.update(currentAge, grids.tox[Math.floor(c.x)][Math.floor(c.y)], grids.bdnf[Math.floor(c.x)][Math.floor(c.y)], grids.il10[Math.floor(c.x)][Math.floor(c.y)], grids.chemo[Math.floor(c.x)][Math.floor(c.y)]);
            if (res === 'divide') newborns.push(new Cell(c.x+(Math.random()-0.5)*5, c.y+(Math.random()-0.5)*5, 'cancer'));
        });
        cells.push(...newborns);

        if (ticks % 100 === 0) {
            const v = (cells.filter(c=>c.type==='neuron'&&c.health>0).length / baseline) * 100;
            history.push({ a: currentAge.toFixed(2), v: v.toFixed(2) });
        }
    }
    render();
    updateStats();
    requestAnimationFrame(loop);
}

function render() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let x=0; x<DIM; x++) for(let y=0; y<DIM; y++) {
        if (grids.tox[x][y] > 0.05) { ctx.fillStyle = `rgba(239,68,68,${grids.tox[x][y]*0.3})`; ctx.fillRect(x*ZOOM,y*ZOOM,ZOOM,ZOOM); }
        if (grids.bdnf[x][y] > 0.05) { ctx.fillStyle = `rgba(14,165,233,${grids.bdnf[x][y]*0.4})`; ctx.fillRect(x*ZOOM,y*ZOOM,ZOOM,ZOOM); }
    }
    cells.forEach(c => {
        if (c.health <= 0) return;
        ctx.fillStyle = c.type==='neuron'?'#38bdf8':(c.type==='cancer'?'#a855f7':(c.active?'#ef4444':'#22c55e'));
        ctx.globalAlpha = c.health/100;
        ctx.beginPath(); ctx.arc(c.x*ZOOM, c.y*ZOOM, 2.5, 0, 7); ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function updateStats() {
    const alive = cells.filter(c => c.type === 'neuron' && c.health > 0).length;
    const age = parseFloat(document.getElementById('age-input').value) + (ticks/500);
    document.getElementById('stat-age').innerText = age.toFixed(1);
    document.getElementById('stat-neurons').innerText = ((alive/baseline)*100).toFixed(2) + "%";
    document.getElementById('stat-tox').innerText = (grids.tox.flat().reduce((a,b)=>a+b,0)/100).toFixed(1) + "%";
}

canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left)/ZOOM, y = (e.clientY - rect.top)/ZOOM;
    const type = document.getElementById('tool-select').value;
    cells.push(new Cell(x,y,type));
    if (type === 'neuron') baseline++;
    render();
};

document.getElementById('run-btn').onclick = (e) => {
    isRunning = !isRunning; e.target.innerText = isRunning ? "PAUSE" : "START";
    e.target.classList.toggle('active'); if(isRunning) loop();
};

function inject(t) { 
    if (t === 'chemo') grids.chemo.forEach(r => r.fill(0.8));
    else grids[t][50][50] = 15; 
}

function exportCSV() {
    let csv = "Age,Viability%\n" + history.map(h => `${h.a},${h.v}`).join("\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
    link.download = "sim_data.csv"; link.click();
}

init();
</script>
</body>
</html>
