<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTheraSim | Neuroscience & Therapeutics Simulator</title>
    <style>
        :root { --bg: #020617; --panel: #0f172a; --text: #f1f5f9; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; --border: #334155; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        h1 { font-size: 1.4rem; color: var(--accent); margin: 0 0 5px 0; font-weight: 800; }
        .subtitle { font-size: 0.7rem; color: #64748b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .section { margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; color: #94a3b8; }
        
        select, input, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 0.85rem; margin-bottom: 8px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: 700; border: none; transition: 0.2s; }
        #run-btn { background: var(--success); color: #052e16; }
        #run-btn.active { background: var(--danger); color: white; }
        #inject-btn { background: var(--accent); color: #082f49; }
        #reset-btn { background: #475569; margin-top: auto; }

        /* Main Viewport */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #top-bar { height: 75px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; gap: 40px; }
        .stat { display: flex; flex-direction: column; min-width: 100px; }
        .stat-label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .stat-value { font-family: 'monospace'; font-size: 1.2rem; color: var(--accent); font-weight: bold; }

        #canvas-wrap { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        canvas { background: #000; border: 1px solid #1e293b; cursor: crosshair; image-rendering: pixelated; }

        /* HUD Elements */
        #legend { position: absolute; bottom: 20px; left: 20px; background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .legend-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; margin-bottom: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        
        #timeline-container { position: absolute; top: 20px; right: 20px; width: 200px; background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>NeuroTheraSim</h1>
    <div class="subtitle">Bio-Circuit Simulator</div>
    
    <div class="section">
        <label>Time Progression Speed</label>
        <input type="range" id="speed-slider" min="1" max="25" value="5">
        <div style="display:flex; justify-content: space-between; font-size:0.6rem; color:#64748b;"><span>Slow</span><span>Fast</span></div>
    </div>

    <div class="section">
        <label>Patient Demographics</label>
        <div style="display:flex; gap:8px;">
            <select id="sex-input"><option value="female">Female</option><option value="male">Male</option></select>
            <input type="number" id="age-input" value="80" title="Age">
        </div>
        <label style="margin-top:10px;">Disease Pathway</label>
        <select id="preset-select">
            <option value="healthy">Healthy Baseline</option>
            <option value="ad">Alzheimer's Model (Aggressive)</option>
            <option value="gbm">Glioblastoma (Tumor)</option>
        </select>
    </div>

    <div class="section">
        <label>Interaction Tool</label>
        <select id="tool-select">
            <option value="inject">Therapy Injector (Blue)</option>
            <option value="add_cancer">Seed Malignant Cell (Purple)</option>
            <option value="add_microglia">Deploy Microglia (Green)</option>
        </select>
    </div>

    <div class="section">
        <label>Current Therapy</label>
        <select id="therapy-type">
            <option value="bdnf">BDNF (Neuroprotection)</option>
            <option value="anti-inf">IL-10 (Anti-Inflammatory)</option>
        </select>
        <button id="inject-btn">ADMINISTER GLOBAL DOSE</button>
    </div>

    <button id="run-btn">START SIMULATION</button>
    <button id="reset-btn">RESET ENVIRONMENT</button>
</div>

<div id="main">
    <div id="top-bar">
        <div class="stat"><span class="stat-label">Elapsed Time</span><span id="stat-days" class="stat-value">Year 0.0</span></div>
        <div class="stat"><span class="stat-label">Live Neurons</span><span id="stat-neurons" class="stat-value">2,000</span></div>
        <div class="stat"><span class="stat-label">Inflammation</span><span id="stat-tox" class="stat-value">0.0%</span></div>
        <div class="stat"><span class="stat-label">Therapy Level</span><span id="stat-drug" class="stat-value">0.0</span></div>
    </div>

    <div id="canvas-wrap">
        <canvas id="simCanvas"></canvas>
        
        <div id="legend">
            <div class="legend-row"><div class="dot" style="background:#38bdf8"></div> Neuron</div>
            <div class="legend-row"><div class="dot" style="background:#eab308"></div> Astrocyte</div>
            <div class="legend-row"><div class="dot" style="background:#22c55e"></div> Microglia (Resting)</div>
            <div class="legend-row"><div class="dot" style="background:#ef4444"></div> Activated Glia</div>
            <div class="legend-row"><div class="dot" style="background:#a855f7"></div> Cancer Cell</div>
        </div>
    </div>
</div>

<script>
/**
 * SIMULATION CORE
 */
const DIM = 100, ZOOM = 7;
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = DIM * ZOOM;

let isRunning = false;
let ticks = 0;
let cells = [];
let toxGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));
let drugGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));

class Cell {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.health = 100;
        this.active = false;
        this.repro = 0;
    }

    update(age, tx, dg) {
        if (this.health <= 0) return;
        
        // Age is a major factor: Damage multiplier increases exponentially after 50
        const fragility = Math.pow(age / 40, 2.2); 

        if (this.type === 'neuron') {
            // Neurons die if toxicity (inflammation) is present
            if (tx > 0.1) {
                this.health -= (0.2 * fragility); 
            }
            // Therapy (BDNF) heals and stabilizes
            if (dg > 0.1) this.health = Math.min(100, this.health + 0.8);
        }

        if (this.type === 'microglia') {
            // Microglia "prime" and activate if they sense nearby inflammation
            if (tx > 0.15 || this.active) {
                this.active = true;
                // Once active, they pump OUT more toxicity (positive feedback loop)
                const cx = Math.floor(this.x), cy = Math.floor(this.y);
                toxGrid[cx][cy] = Math.min(1, toxGrid[cx][cy] + 0.12);
            }
            // Anti-inflammatory drugs "calm" the microglia
            if (dg > 0.4) this.active = false;
        }

        if (this.type === 'cancer') {
            this.repro++;
            const cx = Math.floor(this.x), cy = Math.floor(this.y);
            toxGrid[cx][cy] = 1.0; // Tumors create toxic microenvironments
            if (this.repro > 35) { // Multiplication rate
                this.repro = 0;
                return 'divide';
            }
        }
        return null;
    }

    draw() {
        if (this.health <= 0) return;
        let color = '#38bdf8'; // Default Blue (Neuron)
        if (this.type === 'microglia') color = this.active ? '#ef4444' : '#22c55e';
        if (this.type === 'astrocyte') color = '#eab308';
        if (this.type === 'cancer') color = '#a855f7';

        ctx.fillStyle = color;
        ctx.globalAlpha = Math.max(0.15, this.health / 100);
        ctx.beginPath();
        ctx.arc(this.x * ZOOM, this.y * ZOOM, this.type === 'neuron' ? 2.8 : 2.2, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

function initEnvironment() {
    cells = [];
    ticks = 0;
    toxGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));
    drugGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));
    const preset = document.getElementById('preset-select').value;

    // Population Density (approx 2200 cells)
    for(let i=0; i<2200; i++) {
        let type = 'neuron';
        if (i > 1600) type = 'astrocyte';
        if (i > 2000) type = 'microglia';
        cells.push(new Cell(Math.random()*DIM, Math.random()*DIM, type));
    }

    if (preset === 'ad') {
        // Seed initial plaques
        for(let j=0; j<25; j++) toxGrid[Math.floor(Math.random()*DIM)][Math.floor(Math.random()*DIM)] = 1.0;
    }
    if (preset === 'gbm') {
        cells.push(new Cell(DIM/2, DIM/2, 'cancer'));
    }

    updateUI();
    render();
}

function simulationStep() {
    if (!isRunning) return;
    
    const speed = parseInt(document.getElementById('speed-slider').value);
    const age = parseInt(document.getElementById('age-input').value);

    // Speed multiplier logic
    for(let s=0; s<speed; s++) {
        ticks++;
        
        // 1. Grid Physics (Diffusion & Decay)
        let nextTox = toxGrid.map(r => [...r]);
        let nextDrug = drugGrid.map(r => [...r]);
        for(let x=1; x<DIM-1; x++) {
            for(let y=1; y<DIM-1; y++) {
                // Tox diffusion
                let tAvg = (toxGrid[x+1][y] + toxGrid[x-1][y] + toxGrid[x][y+1] + toxGrid[x][y-1]) / 4;
                nextTox[x][y] = (toxGrid[x][y] + 0.12 * (tAvg - toxGrid[x][y])) * 0.985;
                // Drug diffusion
                let dAvg = (drugGrid[x+1][y] + drugGrid[x-1][y] + drugGrid[x][y+1] + drugGrid[x][y-1]) / 4;
                nextDrug[x][y] = (drugGrid[x][y] + 0.1 * (dAvg - drugGrid[x][y])) * 0.97;
            }
        }
        toxGrid = nextTox; drugGrid = nextDrug;

        // 2. Biology Updates
        let newborns = [];
        cells.forEach(c => {
            const tx = toxGrid[Math.floor(c.x)][Math.floor(c.y)];
            const dg = drugGrid[Math.floor(c.x)][Math.floor(c.y)];
            const res = c.update(age, tx, dg);
            if (res === 'divide') {
                newborns.push(new Cell(c.x + (Math.random()-0.5)*4, c.y + (Math.random()-0.5)*4, 'cancer'));
            }
        });
        cells.push(...newborns);
    }

    render();
    updateUI();
    requestAnimationFrame(simulationStep);
}

function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Render Chemical Heatmaps
    for(let x=0; x<DIM; x++) {
        for(let y=0; y<DIM; y++) {
            if (toxGrid[x][y] > 0.03) {
                ctx.fillStyle = `rgba(239, 68, 68, ${toxGrid[x][y] * 0.5})`;
                ctx.fillRect(x*ZOOM, y*ZOOM, ZOOM, ZOOM);
            }
            if (drugGrid[x][y] > 0.03) {
                ctx.fillStyle = `rgba(56, 189, 248, ${drugGrid[x][y] * 0.5})`;
                ctx.fillRect(x*ZOOM, y*ZOOM, ZOOM, ZOOM);
            }
        }
    }
    
    // Render Cellular Agents
    cells.forEach(c => c.draw());
}

function updateUI() {
    const aliveNeurons = cells.filter(c => c.type === 'neuron' && c.health > 0).length;
    let totalTox = 0;
    let totalDrug = 0;
    toxGrid.flat().forEach(v => totalTox += v);
    drugGrid.flat().forEach(v => totalDrug += v);

    document.getElementById('stat-days').innerText = `Year ${(ticks/800).toFixed(1)}`;
    document.getElementById('stat-neurons').innerText = aliveNeurons.toLocaleString();
    document.getElementById('stat-tox').innerText = (totalTox/120).toFixed(1) + "%";
    document.getElementById('stat-drug').innerText = (totalDrug/100).toFixed(1);
}

/**
 * INPUTS
 */
document.getElementById('run-btn').onclick = (e) => {
    isRunning = !isRunning;
    e.target.innerText = isRunning ? "PAUSE SIMULATION" : "RESUME SIMULATION";
    e.target.classList.toggle('active');
    if (isRunning) simulationStep();
};

document.getElementById('inject-btn').onclick = () => {
    // Inject at 10 systemic points
    for(let i=0; i<10; i++) {
        drugGrid[Math.floor(Math.random()*DIM)][Math.floor(Math.random()*DIM)] = 6.0;
    }
};

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / ZOOM);
    const y = Math.floor((e.clientY - rect.top) / ZOOM);
    const tool = document.getElementById('tool-select').value;
    
    if (tool === 'inject') drugGrid[x][y] = 8.0;
    else if (tool === 'add_cancer') cells.push(new Cell(x, y, 'cancer'));
    else if (tool === 'add_microglia') cells.push(new Cell(x, y, 'microglia'));
    render();
});

document.getElementById('reset-btn').onclick = initEnvironment;

// Launch
initEnvironment();
</script>
</body>
</html>
