<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroTheraSim Advanced</title>

<style>
body { margin:0; display:flex; background:#0b1020; color:white; font-family:Arial;}
#left { flex:1; position:relative; }
#right { width:340px; background:#121a33; padding:12px; overflow-y:auto; }

canvas { display:block; }

h3 { margin-top:10px; }

button, select, input {
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#1e2b55;
  border:none;
  color:white;
}

#graph { height:150px; background:black; }

.stat { font-size:13px; margin:2px 0; }
</style>
</head>

<body>

<div id="left">
<canvas id="sim"></canvas>
<canvas id="graph"></canvas>
</div>

<div id="right">

<h2>NeuroTheraSim</h2>

<button id="toggle">Play / Pause</button>
<button id="reset">Reset</button>

<h3>Presets</h3>
<button onclick="preset('healthy')">Healthy</button>
<button onclick="preset('inflamed')">Inflammation</button>
<button onclick="preset('degeneration')">Degeneration</button>
<button onclick="preset('tumor')">Tumor</button>

<h3>Therapy</h3>
<select id="therapy">
<option value="il10">IL-10</option>
<option value="bdnf">BDNF</option>
<option value="nac">NAC</option>
<option value="tmz">Temozolomide</option>
<option value="stem">Stem Cells</option>
</select>

Dose <input type="range" id="dose" min="0.1" max="2" step="0.1" value="1">
Radius <input type="range" id="radius" min="2" max="10" value="4">

<h3>Environment</h3>
Age <input type="range" id="age" min="20" max="90" value="40">
Sex 
<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<h3>Metrics</h3>
<div id="stats"></div>

</div>

<script>

const sim = document.getElementById("sim");
const ctx = sim.getContext("2d");
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

function resize(){
 sim.width = window.innerWidth - 340;
 sim.height = window.innerHeight - 150;
 graph.width = sim.width;
 graph.height = 150;
}
resize();
window.onresize = resize;

const SIZE = 80;
let cellSize;

let grid=[], field=[], running=false;
let history = {neurons:[], tumors:[], infl:[]};
let effects=[];

// ===== INIT =====
function init(){
 grid=[]; field=[];
 cellSize = sim.width / SIZE;

 for(let x=0;x<SIZE;x++){
  grid[x]=[]; field[x]=[];
  for(let y=0;y<SIZE;y++){
   grid[x][y] = Math.random()<0.12 ? {type:"neuron",h:1} : null;
   field[x][y] = {i:0,g:0,t:0};
  }
 }
}
init();

// ===== PRESETS =====
function preset(p){
 init();

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
   if(p==="inflamed") field[x][y].i=1;
   if(p==="degeneration") field[x][y].t=1;
   if(p==="tumor" && Math.random()<0.05){
     grid[x][y]={type:"tumor",h:1};
   }
  }
 }
}

// ===== STEP =====
function step(){

 let age = document.getElementById("age").value;
 let sex = document.getElementById("sex").value;

 let ageFactor = 1 + (age-40)/120;
 let inflFactor = sex==="female" ? 0.9 : 1;

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   let c=grid[x][y];
   let f=field[x][y];
   if(!c) continue;

   let growth = f.g/(1+f.g);
   let infl = f.i/(1+f.i);
   let tox = f.t/(1+f.t);

   if(c.type==="neuron"){
     c.h += growth*0.02 - infl*0.025*inflFactor - tox*0.03*ageFactor;
     c.h = Math.max(0,Math.min(1,c.h));

     if(c.h<=0){
       grid[x][y]=null;
       f.t+=0.3;
     }
   }

   if(c.type==="tumor"){
     f.i += 0.03;
     if(Math.random()<0.015){
       let nx=x+(Math.random()*3|0)-1;
       let ny=y+(Math.random()*3|0)-1;
       if(grid[nx]?.[ny]==null) grid[nx][ny]={type:"tumor",h:1};
     }
   }
  }
 }

 // diffusion (stable)
 for(let x=1;x<SIZE-1;x++){
  for(let y=1;y<SIZE-1;y++){
   field[x][y].i *= 0.98;
   field[x][y].g *= 0.98;
   field[x][y].t *= 0.98;
  }
 }

 // metrics
 let neurons=0,tumors=0, inflSum=0;

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){
   let c=grid[x][y];
   if(c){
     if(c.type==="neuron") neurons++;
     if(c.type==="tumor") tumors++;
   }
   inflSum+=field[x][y].i;
  }
 }

 history.neurons.push(neurons);
 history.tumors.push(tumors);
 history.infl.push(inflSum/1000);

 if(history.neurons.length>200){
  history.neurons.shift();
  history.tumors.shift();
  history.infl.shift();
 }

 document.getElementById("stats").innerHTML =
 `Neurons: ${neurons}<br>Tumors: ${tumors}<br>Inflammation: ${inflSum.toFixed(1)}`;
}

// ===== DRAW =====
function draw(){

 ctx.fillStyle="black";
 ctx.fillRect(0,0,sim.width,sim.height);

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   let f=field[x][y];

   // soft field overlay
   ctx.fillStyle=`rgba(${f.i*200},${f.g*200},${f.t*200},0.2)`;
   ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);

   let c=grid[x][y];
   if(c){
     ctx.fillStyle=c.type==="neuron"?"cyan":"yellow";
     ctx.beginPath();
     ctx.arc(x*cellSize,y*cellSize,cellSize/3,0,Math.PI*2);
     ctx.fill();
   }
  }
 }

 // therapy visualization
 effects.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
   ctx.strokeStyle="white";
   ctx.stroke();
   e.r+=2;
 });
 effects=effects.filter(e=>e.r<80);
}

// ===== GRAPH =====
function drawGraph(){
 gctx.clearRect(0,0,graph.width,graph.height);

 gctx.strokeStyle="cyan";
 gctx.beginPath();
 history.neurons.forEach((v,i)=>gctx.lineTo(i,150-v));
 gctx.stroke();

 gctx.strokeStyle="yellow";
 gctx.beginPath();
 history.tumors.forEach((v,i)=>gctx.lineTo(i,150-v));
 gctx.stroke();
}

// ===== THERAPY =====
sim.onclick=e=>{
 let rect=sim.getBoundingClientRect();
 let x=Math.floor((e.clientX-rect.left)/cellSize);
 let y=Math.floor((e.clientY-rect.top)/cellSize);

 let d=document.getElementById("dose").value;
 let r=document.getElementById("radius").value;
 let type=document.getElementById("therapy").value;

 effects.push({x:e.clientX-rect.left,y:e.clientY-rect.top,r:5});

 for(let dx=-r;dx<=r;dx++){
  for(let dy=-r;dy<=r;dy++){
   let nx=x+dx, ny=y+dy;
   if(field[nx]?.[ny]){

     let f=field[nx][ny];

     if(type==="il10") f.i*=0.6;
     if(type==="bdnf") f.g+=0.4*d;
     if(type==="nac") f.t*=0.5;
     if(type==="tmz" && grid[nx][ny]?.type==="tumor") grid[nx][ny]=null;
     if(type==="stem") grid[nx][ny]={type:"neuron",h:1};
   }
  }
 }
};

// ===== LOOP =====
function loop(){
 if(running){
   step();
   draw();
   drawGraph();
 }
 requestAnimationFrame(loop);
}

document.getElementById("toggle").onclick=()=>running=!running;
document.getElementById("reset").onclick=init;

loop();

</script>

</body>
</html>
