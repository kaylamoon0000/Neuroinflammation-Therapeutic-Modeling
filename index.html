<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTheraSim | Chronos Update</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 340px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h1 { font-size: 1.25rem; margin: 0 0 20px 0; color: var(--accent); letter-spacing: -0.5px; }
        
        .section { margin-bottom: 15px; padding: 12px; background: rgba(15, 23, 42, 0.5); border-radius: 8px; border: 1px solid #334155; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; color: #94a3b8; }
        
        select, input, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 0.85rem; margin-bottom: 8px; box-sizing: border-box; }
        input[type="range"] { padding: 0; cursor: pointer; }
        
        button { cursor: pointer; transition: all 0.2s; font-weight: 600; border: none; }
        #run-btn { background: var(--success); color: #052e16; }
        #run-btn.active { background: var(--danger); color: white; }
        #export-btn { background: #6366f1; color: white; margin-top: 5px; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header-stats { height: 65px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 30px; gap: 40px; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--accent); }

        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #020617; position: relative; }
        canvas { background: #000; box-shadow: 0 0 60px rgba(0,0,0,0.8); cursor: crosshair; image-rendering: pixelated; }

        #log-feed { font-family: monospace; font-size: 0.7rem; color: #64748b; height: 60px; overflow: hidden; line-height: 1.4; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>NeuroTheraSim</h1>
    
    <div class="section">
        <label>Time Progression Speed</label>
        <input type="range" id="speed-slider" min="0" max="10" step="1" value="1">
        <div style="font-size: 0.7rem; display: flex; justify-content: space-between; color: #94a3b8;">
            <span>Pause</span><span>Real-time</span><span>Time-lapse</span>
        </div>
    </div>

    <div class="section">
        <label>Subject Profile (Age & Sex)</label>
        <div style="display: flex; gap: 8px;">
            <select id="sex-input"><option value="female">Female</option><option value="male">Male</option></select>
            <input type="number" id="age-input" value="45" min="1" max="100">
        </div>
        <label style="margin-top:10px;">Clinical Preset</label>
        <select id="preset-select">
            <option value="healthy">Healthy Baseline</option>
            <option value="ad">Alzheimer's Disease</option>
            <option value="gbm">Glioblastoma Multiforme</option>
        </select>
    </div>

    <div class="section">
        <label>Interactive Tools</label>
        <select id="tool-select">
            <option value="add_neuron">Place Neuron</option>
            <option value="add_cancer">Seed Tumor</option>
            <option value="inject">Localized Injection</option>
        </select>
    </div>

    <button id="run-btn">START SIMULATION</button>
    <button id="reset-btn" style="background: #475569;">RESET LAB</button>
    <button id="export-btn">EXPORT DATA (CSV)</button>

    <div class="section" style="margin-top:10px;">
        <div id="log-feed">System Ready...</div>
    </div>
</div>

<div id="main-content">
    <div id="header-stats">
        <div class="stat-box"><span class="stat-label">Timeline</span><span id="stat-days" class="stat-value">Day 0</span></div>
        <div class="stat-box"><span class="stat-label">Viable Neurons</span><span id="stat-neurons" class="stat-value">0</span></div>
        <div class="stat-box"><span class="stat-label">Inflammation Index</span><span id="stat-tox" class="stat-value">0.00%</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>
</div>

<script>
const DIM = 100, ZOOM = 6;
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = DIM * ZOOM;

let isRunning = false;
let frameCount = 0;
let cells = [];
let toxGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));
let drugGrid = Array(DIM).fill().map(() => Array(DIM).fill(0));
let history = []; // For CSV export

class Cell {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.health = 100;
        this.reproClock = 0;
    }

    update(age, sex, tx, dg) {
        if (this.health <= 0) return;
        const fragility = (age / 50) * (sex === 'male' ? 1.1 : 1.0);

        if (this.type === 'neuron') {
            if (tx > 0.2) this.health -= (0.4 * fragility);
            if (dg > 0.1) this.health = Math.min(100, this.health + 0.8);
        }

        if (this.type === 'cancer') {
            this.reproClock++;
            if (this.reproClock > 50) { this.reproClock = 0; return 'divide'; }
            return 'toxic';
        }
        return null;
    }

    draw() {
        if (this.health <= 0) return;
        ctx.fillStyle = this.type === 'neuron' ? '#38bdf8' : (this.type === 'cancer' ? '#a855f7' : '#22c55e');
        ctx.globalAlpha = this.health / 100;
        ctx.beginPath();
        ctx.arc(this.x * ZOOM, this.y * ZOOM, 2.2, 0, Math.PI*2);
        ctx.fill();
    }
}

function diffuse() {
    let nT = toxGrid.map(r => [...r]), nD = drugGrid.map(r => [...r]);
    for (let x = 1; x < DIM - 1; x++) {
        for (let y = 1; y < DIM - 1; y++) {
            nT[x][y] = (toxGrid[x][y] + 0.1 * ((toxGrid[x+1][y]+toxGrid[x-1][y]+toxGrid[x][y+1]+toxGrid[x][y-1])/4 - toxGrid[x][y])) * 0.98;
            nD[x][y] = (drugGrid[x][y] + 0.1 * ((drugGrid[x+1][y]+drugGrid[x-1][y]+drugGrid[x][y+1]+drugGrid[x][y-1])/4 - drugGrid[x][y])) * 0.96;
        }
    }
    toxGrid = nT; drugGrid = nD;
}

function step() {
    if (!isRunning) return;
    
    // The "Timeline" Logic: Runs the logic loop X times per animation frame
    const speed = parseInt(document.getElementById('speed-slider').value);
    
    for (let s = 0; s < speed; s++) {
        frameCount++;
        diffuse();
        const age = parseInt(document.getElementById('age-input').value);
        const sex = document.getElementById('sex-input').value;

        let born = [];
        cells.forEach(c => {
            const res = c.update(age, sex, toxGrid[Math.floor(c.x)][Math.floor(c.y)], drugGrid[Math.floor(c.x)][Math.floor(c.y)]);
            if (res === 'toxic') toxGrid[Math.floor(c.x)][Math.floor(c.y)] = Math.min(1, toxGrid[Math.floor(c.x)][Math.floor(c.y)] + 0.05);
            if (res === 'divide') born.push(new Cell(c.x+(Math.random()-0.5)*2, c.y+(Math.random()-0.5)*2, 'cancer'));
        });
        cells.push(...born);

        // Record data every "Day" (30 ticks)
        if (frameCount % 30 === 0) {
            history.push({ day: frameCount/30, neurons: cells.filter(c => c.type === 'neuron' && c.health > 0).length });
        }
    }

    render();
    requestAnimationFrame(step);
}

function render() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Grids (Combined view)
    for(let x=0; x<DIM; x++) {
        for(let y=0; y<DIM; y++) {
            if(toxGrid[x][y] > 0.05) { ctx.fillStyle = `rgba(239, 68, 68, ${toxGrid[x][y]*0.5})`; ctx.fillRect(x*ZOOM, y*ZOOM, ZOOM, ZOOM); }
            if(drugGrid[x][y] > 0.05) { ctx.fillStyle = `rgba(56, 189, 248, ${drugGrid[x][y]*0.5})`; ctx.fillRect(x*ZOOM, y*ZOOM, ZOOM, ZOOM); }
        }
    }
    cells.forEach(c => c.draw());
    
    const neurons = cells.filter(c => c.type === 'neuron' && c.health > 0).length;
    document.getElementById('stat-days').innerText = `Day ${Math.floor(frameCount/30)}`;
    document.getElementById('stat-neurons').innerText = neurons;
    document.getElementById('stat-tox').innerText = (toxGrid.flat().reduce((a,b)=>a+b,0)/100).toFixed(2) + "%";
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / ZOOM), y = Math.floor((e.clientY - rect.top) / ZOOM);
    const tool = document.getElementById('tool-select').value;
    if (tool === 'inject') {
        for(let i=-3; i<=3; i++) for(let j=-3; j<=3; j++) if(x+i>=0 && x+i<DIM && y+j>=0 && y+j<DIM) drugGrid[x+i][y+j] = 2;
    } else {
        cells.push(new Cell(x, y, tool.replace('add_', '')));
    }
    render();
});

document.getElementById('run-btn').onclick = (e) => {
    isRunning = !isRunning;
    e.target.innerText = isRunning ? "PAUSE SIMULATION" : "RESUME SIMULATION";
    e.target.classList.toggle('active');
    if (isRunning) step();
};

document.getElementById('export-btn').onclick = () => {
    let csv = "Day,NeuronCount\n" + history.map(h => `${h.day},${h.neurons}`).join("\n");
    let blob = new Blob([csv], { type: 'text/csv' });
    let url = window.URL.createObjectURL(blob);
    let a = document.createElement('a'); a.href = url; a.download = 'sim_data.csv'; a.click();
};

document.getElementById('reset-btn').onclick = () => {
    location.reload();
};

// Initial state
for(let i=0; i<400; i++) cells.push(new Cell(Math.random()*DIM, Math.random()*DIM, 'neuron'));
render();
</script>
</body>
</html>
